name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · TypeScript · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Lint
        run: npm run lint -- --max-warnings 50
        continue-on-error: true

      - name: TypeScript type-check
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL || 'https://placeholder.supabase.co' }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY || 'placeholder-key' }}

      - name: Check bundle size
        run: |
          TOTAL=$(find dist/assets -name '*.js' | xargs gzip -c | wc -c)
          echo "Gzipped JS bundle: ${TOTAL} bytes"
          if [ "$TOTAL" -gt 3145728 ]; then
            echo "::warning::Bundle exceeds 3MB gzipped — consider removing unused dependencies"
          fi
