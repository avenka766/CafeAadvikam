# .github/workflows/ci.yml
# Fix: DEV-01 — Zero CI/CD pipeline
name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint · TypeScript · Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (zero warnings allowed)
        run: npm run lint -- --max-warnings 0

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
        env:
          # DEV-01: CI uses placeholder values — real values live in Vercel env vars
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Check bundle size (warn if > 3MB gzipped)
        run: |
          TOTAL=$(find dist/assets -name '*.js' | xargs gzip -c | wc -c)
          echo "Gzipped JS bundle: ${TOTAL} bytes"
          if [ "$TOTAL" -gt 3145728 ]; then
            echo "::warning::Bundle exceeds 3MB gzipped (${TOTAL} bytes) — consider removing unused dependencies"
          fi
