<html lang="en">

    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Cafe Aadvikam — Restaurant & Party Hall</title>
    <meta name="description" content="Pure vegetarian restaurant with authentic South Indian flavours. Order management system for Cafe Aadvikam, 109 Bagalur Main Road, Berikai 635105." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Cafe Aadvikam — Restaurant & Party Hall" />

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Global error handler: catches module-level crashes BEFORE React mounts -->
    <script>
      window.addEventListener('error', function(e) {
        var root = document.getElementById('root');
        if (root && !root.hasChildNodes()) {
          root.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:sans-serif;padding:24px;background:#fdf8f3"><div style="max-width:480px;text-align:center"><div style="font-size:48px;margin-bottom:16px">⚠️</div><h1 style="font-size:20px;font-weight:700;margin-bottom:8px;color:#1a0f0a">App failed to start</h1><p style="color:#666;font-size:14px;margin-bottom:16px">'+e.message+'</p><p style="color:#999;font-size:12px;background:#f5f0ea;padding:12px;border-radius:8px;word-break:break-all">Check Vercel → Settings → Environment Variables → ensure VITE_SUPABASE_URL and VITE_SUPABASE_ANON_KEY are set for the Preview environment, then Redeploy.</p><button onclick="location.reload()" style="margin-top:16px;padding:10px 24px;background:#2D7D6F;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px">Reload</button></div></div>';
        }
      });
      window.addEventListener('unhandledrejection', function(e) {
        console.error('[CafeAadvikam] Unhandled promise rejection:', e.reason);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
